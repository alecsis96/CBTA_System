name: build-mac

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'

      - name: Enable corepack
        run: corepack enable

      - name: Install pnpm
        run: npm install -g pnpm@11.1.2 --force

      - name: Check pnpm
        run: pnpm --version

      - name: Install deps
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Create packaged SQLite database
        run: pnpm prisma db push --schema prisma/schema.prisma
        env:
          DATABASE_URL: file:./prisma/dev.db

      - name: Sync Prisma runtime
        run: |
          mkdir -p node_modules/.prisma
          SOURCE=$(ls -d node_modules/.pnpm/@prisma+client@*_prisma@*/node_modules/.prisma/client | head -n 1)
          if [ -z "$SOURCE" ]; then
            echo "Prisma generated client not found under pnpm store."
            exit 1
          fi
          rm -rf node_modules/.prisma/client
          cp -R "$SOURCE" node_modules/.prisma/client

      - name: Build renderer and electron
        run: pnpm build:renderer && pnpm build:electron

      - name: Build DMG
        run: pnpm exec electron-builder --mac dmg --publish never

      - name: Build ZIP
        run: pnpm exec electron-builder --mac zip --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CBTA44_SYS-mac
          path: release/*
